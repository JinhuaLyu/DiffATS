# -- Method (ABLATION-SPECIFIC) -----------------------------------------------
method: "data_augmentation"      # no_alignment data + per-step random Q rotation

# -- Data (same shards as no_alignment) ---------------------------------------
shard_dir:        "${DATA_ROOT}/tucker_factors/celeba/no_alignment"
alpha_stats_path: "${DATA_ROOT}/tucker_factors/celeba/no_alignment/alpha_stats_no_alignment_p32_r32.pt"
vhat_stats_path:  "${DATA_ROOT}/tucker_factors/celeba/no_alignment/vhat_stats_no_alignment_p32_r32.pt"
mean_avg_path:    "${DATA_ROOT}/tucker_factors/celeba/no_alignment/mean_avg_no_alignment_p32_r32.pt"
num_workers:     8
prefetch_factor: 4

# -- Patch-SVD layout (mirrors our_method) ------------------------------------
image_size: 1024
patch:      32
svd_rank:   32
input_size: [2048, 32]
in_channels: 3
patch_size:  [32, 32]

# -- Model architecture (mirrors our_method) ----------------------------------
hidden_size: 768
depth:       12
num_heads:   12
mlp_ratio:   4.0

# -- Training (mirrors our_method) --------------------------------------------
epochs:            1000
global_batch_size: 32
lr:                1.0e-4
weight_decay:      0.0
seed:              42
compile:           true
use_bf16:          true
ema:               false
ortho_augment:     true            # KEY DIFFERENCE FROM no_alignment

# -- Diffusion (mirrors our_method) -------------------------------------------
noise_schedule:  "linear"
diffusion_steps: 1000
sample_steps:    250
predict_xstart:  true
learn_sigma:     false

# -- Logging & checkpointing (mirrors our_method) -----------------------------
log_every:        100
ckpt_every_epoch: 11
results_dir: "${DATA_ROOT}/ablation_results/data_augmentation"

# -- Resume --------------------------------------------------------------------
resume: ""

# -- Weights & Biases (project mirrors our_method; run_name method-specific) --
wandb_project: "<PROJECT>"
wandb_run_name: "data_augmentation"
wandb_entity:   ""
